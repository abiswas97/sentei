name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish artifacts for"
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Per-run installation token from the sentei-release-bot GitHub App:
      # nothing expires on a calendar, and PRs/tags it creates trigger CI.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  goreleaser:
    needs: release-please
    if: ${{ !cancelled() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: abiswas97
          repositories: sentei,homebrew-tap

      - name: Probe release API with the app token
        if: github.event_name == 'workflow_dispatch'
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          rel=$(curl -s -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$TAG")
          rel_id=$(printf '%s' "$rel" | jq -r '.id // empty')
          test -n "$rel_id" || { echo "::error::GET release by tag failed"; printf '%s\n' "$rel"; exit 1; }
          for scheme in token Bearer; do
            u=$(curl -s -o /tmp/u -w '%{http_code}' -H "Authorization: $scheme $TOKEN" https://api.github.com/user)
            i=$(curl -s -o /tmp/i -w '%{http_code}' -H "Authorization: $scheme $TOKEN" https://api.github.com/installation/repositories)
            c=$(curl -s -o /tmp/probe -w '%{http_code}' -X PATCH \
              -H "Authorization: $scheme $TOKEN" -H "Accept: application/vnd.github+json" \
              -d '{"draft":false}' \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$rel_id")
            echo "scheme=$scheme  GET /user: $u  GET /installation/repositories: $i  PATCH release: $c"
            if [ "$c" != "200" ]; then echo "-- PATCH body:"; cat /tmp/probe; echo "-- /installation/repositories body:"; head -c 300 /tmp/i; echo; fi
          done
          jq -e '.total_count >= 1' /tmp/i >/dev/null || exit 1
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          # App token here too: the Actions GITHUB_TOKEN started 401-ing on
          # release PATCHes with the stateless token rollout (2026-06-10).
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
